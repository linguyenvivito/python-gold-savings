name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-lint:
    name: Backend Lint (Ruff, Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff
        run: ruff check .

  backend-unit-tests:
    name: Backend Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: backend-lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -v tests/unit

  backend-integration-tests:
    name: Backend Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: backend-unit-tests
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: python -m pytest -v tests --ignore=tests/unit

  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build-and-validate:
    name: Docker Build And Compose Validate
    runs-on: ubuntu-latest
    needs:
      - backend-unit-tests
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -f Dockerfile -t restapi-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t restapi-frontend:ci frontend

      - name: Validate docker compose
        env:
          DATABASE_URL: postgresql://postgres:postgres@db:5432/tasks_db
        run: docker compose config
